<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能打卡系統</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
body {font-family:"Arial","Noto Sans TC",sans-serif;background:#f0f4f8;display:flex;justify-content:center;padding:20px;margin:0;}
.card {background:#fff;width:95%;max-width:480px;border-radius:20px;padding:25px 20px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 15px 30px rgba(0,0,0,0.15);}
#userInfo {font-size:28px;font-weight:bold;text-align:center;color:#2c3e50;}
#dateTime {font-size:22px;color:#7f8c8d;text-align:center;}
#statusInfo {font-size:20px;color:white;padding:8px 25px;border-radius:25px;text-align:center;min-width:180px;}
.buttons-container {display:flex;gap:15px;width:100%;}
.buttons-container button {flex:1;padding:15px 0;font-size:22px;font-weight:bold;border-radius:12px;border:none;cursor:pointer;color:white;transition:all 0.2s;}
#btnStart {background: linear-gradient(135deg, #3498db, #2980b9);}
#btnEnd {background: linear-gradient(135deg, #2ecc71, #27ae60);}
button:disabled {opacity:0.5;cursor:not-allowed;}
#todayRecords {width:100%;background:#fafafa;border-radius:14px;padding:15px;border:1px solid #ddd;font-size:18px;text-align:left;}
#todayRecords span {display:block;margin-bottom:5px;padding-left:5px;border-left:3px solid #3498db;}
/* 主管審批按鈕 */
#btnApprove {
    margin-top:10px;
    padding:12px 20px;
    font-size:18px;
    font-weight:bold;
    border-radius:10px;
    background:linear-gradient(145deg,#8e44ad,#663399);
    color:white;
    display:none;
    width:100%;
    cursor:pointer;
    border:none;
}
#btnApprove:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

</style>
</head>
<body>
<div class="card">
  <div id="userInfo">載入使用者資訊中...</div>
  <div id="statusInfo">定位確認中…</div>
  <div id="dateTime">載入中…</div>
  <div class="buttons-container">
    <button id="btnStart" disabled>上班</button>
    <button id="btnEnd" disabled>下班</button>
  </div>
  <div id="todayRecords">今日打卡紀錄（點擊更新）</div>
  <button id="btnApprove">查看 | 簽核</button>
</div>
 
<script>
const API_ENDPOINT="https://script.google.com/macros/s/AKfycbw2dT2HNMpk4ItYnS2sdKBSkjBCMQqPU07KdKvuJZkHaYlr7UHLW_l__c18gOWZ0iAp/exec";

/* ===== 主管名單（前端） ===== */
const MANAGERS = [
  "U10fee4a9c1cb88e07f7e4c5e35e74100",
  "U8548bb876dda1d67c87170aba8b518f7"
];

/* ===== 狀態變數 ===== */
let userId="", userName="", dataReady=false;
let statusLoaded=false;
let isManager = false;

/* ===== GPS ===== */
let lastGPS = null;
let lastCheckGPS = null;
let gpsAccuracy = null;
let lastRangeStatus = null;
let cachedIP = "";

/* ===== DOM ===== */
const btnStart=document.getElementById("btnStart");
const btnEnd=document.getElementById("btnEnd");
const userInfo=document.getElementById("userInfo");
const statusInfo=document.getElementById("statusInfo");
const dateTime=document.getElementById("dateTime");
const todayRecords=document.getElementById("todayRecords");

/* ===== 距離計算 ===== */
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;

  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng / 2) ** 2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* ===== 時間 ===== */
function updateDateTime(){
  const now=new Date();
  dateTime.textContent=now.toLocaleString("zh-TW",{hour12:false});
}
setInterval(updateDateTime,1000);
updateDateTime();

/* ===== IP ===== */
async function preloadIP(){
  try{
    const res=await fetch("https://api.ipify.org?format=json");
    const data=await res.json();
    cachedIP = data.ip;
  }catch{}
}
function getIP(){
  return cachedIP || "";
}

/* ===== GPS（核心優化） ===== */
function initGPSWatcher() {
  if (!navigator.geolocation) return;

  navigator.geolocation.watchPosition(
    pos => {

      gpsAccuracy = pos.coords.accuracy;

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      lastGPS = { lat, lng };

      // 🔥 30公尺內不重複觸發 API
      if (lastCheckGPS) {
        const dist = getDistance(
          lastCheckGPS.lat,
          lastCheckGPS.lng,
          lat,
          lng
        );

        if (dist < 30) return;
      }

      lastCheckGPS = { lat, lng };

      updateStatus();

    },
    err => console.warn("GPS錯誤:", err),
    {
      enableHighAccuracy: true,
      maximumAge: 3000,
      timeout: 5000
    }
  );
}

/* ===== 鎖按鈕 ===== */
function setButtonsLock(lock){
  btnStart.disabled=lock;
  btnEnd.disabled=lock;
}

/* ===== 狀態檢查 ===== */
async function updateStatus() {

  if (!lastGPS) {
    statusInfo.textContent = "定位中…";
    statusInfo.style.background = "#95a5a6";
    return;
  }

  try {
    const res = await fetch(
      `${API_ENDPOINT}?action=check&lat=${lastGPS.lat}&lng=${lastGPS.lng}&ip=${getIP()}`
    );

    const data = await res.json();
    const newStatus = data.rangeStatus;

    if (!newStatus) return;
    if (newStatus === lastRangeStatus) return;

    lastRangeStatus = newStatus;

    if (newStatus === "有效打卡區") {
      statusInfo.style.background = "#2ecc71";
      statusInfo.textContent = "有效打卡區";

      btnStart.disabled = false;
      btnEnd.disabled = false;

    } else {
      statusInfo.style.background = "#e74c3c";
      statusInfo.textContent = "無效打卡區" +
        (data.distance ? ` (${data.distance} 公尺)` : "");

      if (!isManager) {
        btnStart.disabled = true;
        btnEnd.disabled = true;
      }
    }

    statusLoaded = true;

  } catch (err) {
    console.warn("狀態更新失敗:", err);
  }
}

/* ===== 今日紀錄 ===== */
async function updateTodayRecords(){
  todayRecords.innerHTML="載入中...";
  try{
    const res = await fetch(`${API_ENDPOINT}?action=getToday&userId=${userId}`);
    const data = await res.json();

    if(!data.length){
      todayRecords.innerHTML="今日打卡紀錄：無";
      return;
    }

    todayRecords.innerHTML="今日打卡紀錄：<br>";

    data.forEach(r=>{
      let color="#3498db";
      if(r.status==="下班") color="#2ecc71";
      if(r.company.includes("錯誤")) color="#e67e22";

      todayRecords.innerHTML+=
        `<span style="border-left-color:${color}">
          ${r.status}：${r.time}（${r.company}）
        </span>`;
    });

  }catch{
    todayRecords.innerHTML="今日打卡紀錄：讀取失敗";
  }
}

/* ===== LIFF 初始化 ===== */
async function initUser(){
  await liff.init({ liffId: "2008786085-L1CtKqqv" });

  if (!liff.isLoggedIn()) {
    await liff.login();
  }

  const profile = await liff.getProfile();
  userId = profile.userId;
  userName = profile.displayName;

  userInfo.textContent = `${userName} 您好`;

  isManager = MANAGERS.includes(userId);

  // ===== 主管按鈕（完整修復）=====
  if (isManager) {
    const btnApprove = document.getElementById("btnApprove");
    btnApprove.style.display = "block";

    btnApprove.onclick = () => {
      window.location.href =
        "https://script.google.com/macros/s/AKfycbz1FavWzmy5sl8iFCRfp7ZHQ_3EdFhTw_M093XAtq8ISIn9jiWrujfgZjjqRZxorTdkLQ/exec";
    };
  }
}

/* ===== 打卡 ===== */
async function clockInOut(status){

  if(!dataReady || !statusLoaded){
    Swal.fire({icon:"info",title:"資料讀取中或定位中",timer:1500,showConfirmButton:false});
    return;
  }

  if (lastRangeStatus !== "有效打卡區" && !isManager) {
    Swal.fire({
      icon: "warning",
      title: "目前為無效打卡區",
      timer: 1500,
      showConfirmButton: false
    });
    return;
  }

  const btn = status==="上班"?btnStart:btnEnd;
  btn.disabled = true;

  let sec = 3;
  const timer = setInterval(()=>{
    btn.textContent = `打卡中… ${sec}s`;
    sec--;
    if(sec<0) clearInterval(timer);
  },1000);

  try{
    const res = await fetch(API_ENDPOINT, {
      method:"POST",
      body: JSON.stringify({
        userId,
        userName,
        ip:getIP(),
        gps:lastGPS,
        status
      })
    });

    const data = await res.json();

    if(data.message && data.message.includes("成功")){

      Swal.fire({
        icon: data.rangeStatus==="有效打卡區"?"success":"warning",
        title:"打卡完成",
        timer:1500,
        showConfirmButton:false
      });

      updateTodayRecords();
      updateStatus();
    }

  }catch(err){
    Swal.fire({icon:"error",title:"打卡失敗",timer:1500});
  }finally{
    btn.textContent = status==="上班"?"上班":"下班";
    btn.disabled = false;
  }
}

btnStart.onclick = () => clockInOut("上班");
btnEnd.onclick = () => clockInOut("下班");

/* ===== 載入 ===== */
window.onload = async () => {

  statusInfo.textContent = "定位載入中…";
  statusInfo.style.background = "#95a5a6";

  setButtonsLock(true);

  initGPSWatcher();   // 🔥 核心優化
  preloadIP();

  await initUser();
  await updateTodayRecords();

  setButtonsLock(false);
  dataReady = true;
};
</script>


</body>
</html>
