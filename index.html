<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能打卡系統</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
body {font-family:"Arial","Noto Sans TC",sans-serif;background:#f0f4f8;display:flex;justify-content:center;padding:20px;margin:0;}
.card {background:#fff;width:95%;max-width:480px;border-radius:20px;padding:25px 20px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 15px 30px rgba(0,0,0,0.15);}
#userInfo {font-size:28px;font-weight:bold;text-align:center;color:#2c3e50;}
#dateTime {font-size:22px;color:#7f8c8d;text-align:center;}
#statusInfo {font-size:20px;color:white;padding:8px 25px;border-radius:25px;text-align:center;min-width:180px;}
.buttons-container {display:flex;gap:15px;width:100%;}
.buttons-container button {flex:1;padding:15px 0;font-size:22px;font-weight:bold;border-radius:12px;border:none;cursor:pointer;color:white;transition:all 0.2s;}
#btnStart {background: linear-gradient(135deg, #3498db, #2980b9);}
#btnEnd {background: linear-gradient(135deg, #2ecc71, #27ae60);}
button:disabled {opacity:0.5;cursor:not-allowed;}
#todayRecords {width:100%;background:#fafafa;border-radius:14px;padding:15px;border:1px solid #ddd;font-size:18px;text-align:left;}
#todayRecords span {display:block;margin-bottom:5px;padding-left:5px;border-left:3px solid #3498db;}
/* 主管審批按鈕 */
#btnApprove {
    margin-top:10px;
    padding:12px 20px;
    font-size:18px;
    font-weight:bold;
    border-radius:10px;
    background:linear-gradient(145deg,#8e44ad,#663399);
    color:white;
    display:none;
    width:100%;
    cursor:pointer;
    border:none;
}
#btnApprove:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

</style>
</head>
<body>
<div class="card">
  <div id="userInfo">載入使用者資訊中...</div>
  <div id="statusInfo">定位確認中…</div>
  <div id="dateTime">載入中…</div>
  <div class="buttons-container">
    <button id="btnStart" disabled>上班</button>
    <button id="btnEnd" disabled>下班</button>
  </div>
  <div id="todayRecords">今日打卡紀錄（點擊更新）</div>
  <button id="btnApprove">查看 | 簽核</button>
</div>
 
<script>
const API_ENDPOINT="https://script.google.com/macros/s/AKfycbw2dT2HNMpk4ItYnS2sdKBSkjBCMQqPU07KdKvuJZkHaYlr7UHLW_l__c18gOWZ0iAp/exec";

let userId="", userName="", dataReady=false;
let statusLoaded=false;
let isManager = false;

let lastGPS = null;
let lastCheckGPS = null;
let gpsAccuracy = null;
let lastRangeStatus = null;
let cachedIP = "";

/* ===== 防重複請求（優化關鍵） ===== */
let statusFetching = false;

/* ===== DOM ===== */
const btnStart=document.getElementById("btnStart");
const btnEnd=document.getElementById("btnEnd");
const userInfo=document.getElementById("userInfo");
const statusInfo=document.getElementById("statusInfo");
const dateTime=document.getElementById("dateTime");
const todayRecords=document.getElementById("todayRecords");

/* ===== 主管 ===== */
let MANAGERS = [];

async function loadManagers(){
  try{
    const res = await fetch(`${API_ENDPOINT}?action=getManagers`);
    MANAGERS = await res.json();
  }catch{
    MANAGERS = [];
  }
}

/* ===== 時間（降低重繪壓力） ===== */
let lastTimeText = "";
function updateDateTime(){
  const now=new Date();
  const text = now.toLocaleString("zh-TW",{hour12:false});

  if(text === lastTimeText) return;
  lastTimeText = text;

  dateTime.textContent = text;
}
setInterval(updateDateTime,1000);

/* ===== IP ===== */
async function preloadIP(){
  try{
    const res=await fetch("https://api.ipify.org?format=json");
    const data=await res.json();
    cachedIP = data.ip;
  }catch{}
}
function getIP(){ return cachedIP || ""; }

/* ===== GPS（只觸發必要更新） ===== */
function initGPSWatcher(){
  if(!navigator.geolocation) return;

  navigator.geolocation.watchPosition(
    pos=>{

      gpsAccuracy = pos.coords.accuracy;

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      lastGPS = {lat,lng};

      // 🔥 沒移動就不更新
      if(lastCheckGPS){
        const d = Math.hypot(
          lat-lastCheckGPS.lat,
          lng-lastCheckGPS.lng
        );

        if(d < 0.0002) return; // 約 20~30m
      }

      lastCheckGPS = {lat,lng};

      updateStatusThrottled();

    },
    err=>console.warn("GPS錯誤:",err),
    {enableHighAccuracy:true,maximumAge:3000,timeout:5000}
  );
}

/* ===== 節流 updateStatus（核心優化） ===== */
let lastStatusCall = 0;
function updateStatusThrottled(){
  const now = Date.now();
  if(now - lastStatusCall < 2000) return; // 2秒節流
  lastStatusCall = now;

  updateStatus();
}

/* ===== 狀態更新（避免重複 DOM） ===== */
async function updateStatus(){

  if(statusFetching) return;
  statusFetching = true;

  try{

    if(!lastGPS){
      statusInfo.textContent = "定位中…";
      statusInfo.style.background = "#95a5a6";
      return;
    }

    const res = await fetch(
      `${API_ENDPOINT}?action=check&lat=${lastGPS.lat}&lng=${lastGPS.lng}&ip=${getIP()}`
    );

    const data = await res.json();

    if(!data.rangeStatus) return;

    if(data.rangeStatus === lastRangeStatus) return;
    lastRangeStatus = data.rangeStatus;

    if(data.rangeStatus === "有效打卡區"){
      statusInfo.style.background = "#2ecc71";
      statusInfo.textContent = "有效打卡區";
      btnStart.disabled = false;
      btnEnd.disabled = false;

    } else {
      statusInfo.style.background = "#e74c3c";
      statusInfo.textContent =
        "無效打卡區" +
        (data.distance ? ` (${data.distance} 公尺)` : "");

      if(!isManager){
        btnStart.disabled = true;
        btnEnd.disabled = true;
      }
    }

    statusLoaded = true;

  }catch(err){
    console.warn(err);
  }finally{
    statusFetching = false;
  }
}

/* ===== 今日紀錄（避免重複 render） ===== */
async function updateTodayRecords(){
  todayRecords.textContent="載入中...";

  try{
    const res = await fetch(`${API_ENDPOINT}?action=getToday&userId=${userId}`);
    const data = await res.json();

    if(!data.length){
      todayRecords.textContent="今日打卡紀錄：無";
      return;
    }

    let html = "今日打卡紀錄：<br>";

    for(const r of data){
      let color="#3498db";
      if(r.status==="下班") color="#2ecc71";
      if(r.company.includes("錯誤")) color="#e67e22";

      html += `<span style="border-left-color:${color}">
        ${r.status}：${r.time}（${r.company}）
      </span>`;
    }

    todayRecords.innerHTML = html;

  }catch{
    todayRecords.textContent="今日打卡紀錄：讀取失敗";
  }
}

/* ===== LIFF ===== */
async function initUser(){
  await liff.init({ liffId: "2008786085-L1CtKqqv" });

  if(!liff.isLoggedIn()) await liff.login();

  const profile = await liff.getProfile();

  userId = profile.userId;
  userName = profile.displayName;

  userInfo.textContent = `${userName} 您好`;

  await loadManagers();

  isManager = MANAGERS.includes(userId);

  const btnApprove = document.getElementById("btnApprove");

  if(btnApprove){
    if(isManager){
      btnApprove.style.display = "block";
      btnApprove.onclick = () => {
        window.location.href =
          "https://script.google.com/macros/s/AKfycbz1FavWzmy5sl8iFCRfp7ZHQ_3EdFhTw_M093XAtq8ISIn9jiWrujfgZjjqRZxorTdkLQ/exec";
      };
    }else{
      btnApprove.style.display = "none";
    }
  }
}

/* ===== 打卡（不變） ===== */
async function clockInOut(status){

  if(!dataReady || !statusLoaded){
    Swal.fire({icon:"info",title:"資料讀取中或定位中",timer:1500});
    return;
  }

  if(lastRangeStatus !== "有效打卡區" && !isManager){
    Swal.fire({icon:"warning",title:"無效打卡區",timer:1500});
    return;
  }

  const btn = status==="上班"?btnStart:btnEnd;
  btn.disabled = true;

  try{
    const res = await fetch(API_ENDPOINT,{
      method:"POST",
      body: JSON.stringify({userId,userName,ip:getIP(),gps:lastGPS,status})
    });

    const data = await res.json();

    if(data.message?.includes("成功")){
      Swal.fire({icon:"success",title:"打卡完成",timer:1500});
      updateTodayRecords();
      updateStatus();
    }

  }catch{
    Swal.fire({icon:"error",title:"打卡失敗"});
  }finally{
    btn.disabled = false;
  }
}

btnStart.onclick = ()=>clockInOut("上班");
btnEnd.onclick = ()=>clockInOut("下班");

/* ===== 初始化 ===== */
window.onload = async ()=>{

  statusInfo.textContent="定位載入中…";
  statusInfo.style.background="#95a5a6";

  initGPSWatcher();
  preloadIP();

  await initUser();
  await updateTodayRecords();

  dataReady = true;

  updateStatus(); // 初次
};
</script>


</body>
</html>
